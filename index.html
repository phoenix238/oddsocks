function getGASScript(){
return `// ═══════════════════════════════════════════════════
// ODD SOCKS — Google Apps Script  v2
// ═══════════════════════════════════════════════════
// 1. Open a new Google Sheet
// 2. Extensions > Apps Script > paste this > Save
// 3. Deploy > New deployment > Web App
//    Execute as: Me   |   Access: Anyone
// 4. Copy the /exec URL into Odd Socks Settings
// ═══════════════════════════════════════════════════

// ── FOLDER STRUCTURE ──────────────────────────────
// Google Drive/
//   Odd Socks/
//     Odd Socks Master Log  (this spreadsheet)
//     Business Expenses/    (receipt photos)
//     Invoices/
//       [Client Name]/      (Google Doc invoices)
//     PODs/
//       [Client Name]/      (proof of delivery photos)

var ROOT_NAME = 'Odd Socks';

function getRootFolder() {
  var driveRoot = DriveApp.getRootFolder();
  var it = driveRoot.getFoldersByName(ROOT_NAME);
  return it.hasNext() ? it.next() : driveRoot.createFolder(ROOT_NAME);
}

function getOrCreateFolder(name, parent) {
  var p = parent || getRootFolder();
  var it = p.getFoldersByName(name);
  return it.hasNext() ? it.next() : p.createFolder(name);
}

function initFolders() {
  var root = getRootFolder();
  getOrCreateFolder('Business Expenses', root);
  getOrCreateFolder('Invoices', root);
  getOrCreateFolder('PODs', root);
  // Move this spreadsheet into the root folder if it isn't already
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var ssFile = DriveApp.getFileById(ss.getId());
  var parents = ssFile.getParents();
  var alreadyInRoot = false;
  while (parents.hasNext()) {
    if (parents.next().getId() === root.getId()) { alreadyInRoot = true; break; }
  }
  if (!alreadyInRoot) {
    root.addFile(ssFile);
    try { DriveApp.getRootFolder().removeFile(ssFile); } catch(e) {}
  }
  return root;
}

// ── REQUEST HANDLER ───────────────────────────────
function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var action = data.action;
    if (action === 'test')           return testConnection();
    if (action === 'syncAll')        return syncAll(data);
    if (action === 'uploadPhoto')    return uploadPhoto(data);
    if (action === 'createInvoiceDoc') return createInvoiceDoc(data);
    return respond({ok: false, msg: 'Unknown action: ' + action});
  } catch(err) {
    return respond({ok: false, msg: err.toString()});
  }
}

function doGet(e) {
  return respond({ok: true, msg: 'Odd Socks GAS is running.'});
}

function respond(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}

function testConnection() {
  initFolders();
  var root = getRootFolder();
  return respond({
    ok: true,
    msg: 'Connected! Drive folder and Sheets are ready.',
    folderUrl: root.getUrl()
  });
}

// ── SHEETS SYNC ───────────────────────────────────
function syncAll(data) {
  initFolders();
  writeSheet('Jobs',
    ['Date Completed','Client','Item','Pickup Post','Delivery Post',
     'Price £','Miles','Mileage Claim £','Status','Invoice No',
     'Invoice Status','Paid Date','POD URL'],
    data.jobs || [],
    {currency:[6,8], status:{col:9, paid:'#c8e6c9', draft:'#fff9c4', sent:'#bbdefb', overdue:'#ffcdd2'}});
  writeSheet('Invoices',
    ['Invoice No','Client','Issue Date','Due Date','Total £',
     'Status','Paid Date','Payment Method','Doc URL'],
    data.invoices || [],
    {currency:[5], status:{col:6, paid:'#c8e6c9', draft:'#fff9c4', sent:'#bbdefb', overdue:'#ffcdd2'}});
  writeSheet('Business Expenses',
    ['Date','Category','Description','Amount £','Receipt URL'],
    data.expenses || [],
    {currency:[4]});
  writeSheet('Mileage',
    ['Date','Job','Client','Pickup Post','Delivery Post',
     'Miles','Rate £/mi','Claim £'],
    data.mileage || [],
    {currency:[7,8]});
  writeSheet('P&L',
    ['Month','Income Paid £','Outstanding £','Expenses £',
     'Mileage Claims £','Net Profit £','Tax Stash £'],
    data.pl || [],
    {currency:[2,3,4,5,6,7]});
  writeDashboard(data);
  return respond({ok: true});
}

function writeSheet(name, headers, rows, opts) {
  opts = opts || {};
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName(name);
  if (!sh) sh = ss.insertSheet(name);
  sh.clearContents();
  sh.clearFormats();

  var allRows = [headers].concat(rows);
  if (allRows.length > 0) {
    sh.getRange(1, 1, allRows.length, headers.length).setValues(allRows);
  }

  // Header row styling
  var hdr = sh.getRange(1, 1, 1, headers.length);
  hdr.setBackground('#0f380f')
     .setFontColor('#c4d96b')
     .setFontWeight('bold')
     .setFontSize(9)
     .setVerticalAlignment('middle')
     .setHorizontalAlignment('center');
  sh.setRowHeight(1, 28);
  sh.setFrozenRows(1);

  if (rows.length === 0) return;

  // Alternating row colors
  for (var r = 0; r < rows.length; r++) {
    var bg = (r % 2 === 0) ? '#ffffff' : '#f4f8f0';
    sh.getRange(r + 2, 1, 1, headers.length).setBackground(bg).setFontSize(9);
    sh.setRowHeight(r + 2, 22);
  }

  // Currency columns — right-align and format
  (opts.currency || []).forEach(function(c) {
    if (c <= headers.length) {
      sh.getRange(2, c, rows.length, 1)
        .setNumberFormat('£#,##0.00')
        .setHorizontalAlignment('right');
    }
  });

  // Status column — colour-code by value
  if (opts.status) {
    var sc = opts.status.col;
    rows.forEach(function(row, ri) {
      var val = (row[sc - 1] || '').toString().toLowerCase();
      var bg2 = null;
      if (val === 'paid') bg2 = opts.status.paid;
      else if (val === 'draft') bg2 = opts.status.draft;
      else if (val === 'sent') bg2 = opts.status.sent;
      else if (val === 'overdue') bg2 = opts.status.overdue;
      else if (val === 'done') bg2 = opts.status.paid;
      if (bg2) sh.getRange(ri + 2, sc, 1, 1).setBackground(bg2).setFontWeight('bold');
    });
  }

  // Border around all data
  sh.getRange(1, 1, allRows.length, headers.length)
    .setBorder(true, true, true, true, true, true,
      '#cccccc', SpreadsheetApp.BorderStyle.SOLID);

  sh.autoResizeColumns(1, headers.length);
}

function writeDashboard(data) {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sh = ss.getSheetByName('Dashboard');
  if (!sh) {
    sh = ss.insertSheet('Dashboard');
    // Move dashboard to front
    ss.setActiveSheet(sh);
    ss.moveActiveSheet(1);
  }
  sh.clearContents();
  sh.clearFormats();
  sh.setColumnWidth(1, 20);   // left margin
  sh.setColumnWidth(2, 160);
  sh.setColumnWidth(3, 160);
  sh.setColumnWidth(4, 160);
  sh.setColumnWidth(5, 160);
  sh.setColumnWidth(6, 20);   // right margin

  // ── Title bar ──
  var titleRange = sh.getRange(1, 1, 1, 6);
  titleRange.merge().setValue('').setBackground('#0f380f');
  sh.setRowHeight(1, 8);

  var titleRow = sh.getRange(2, 1, 1, 6);
  titleRow.merge().setValue('ODD SOCKS — FINANCIAL DASHBOARD')
    .setBackground('#0f380f')
    .setFontColor('#c4d96b')
    .setFontWeight('bold')
    .setFontSize(16)
    .setHorizontalAlignment('center')
    .setVerticalAlignment('middle');
  sh.setRowHeight(2, 48);

  sh.getRange(3, 1, 1, 6).merge().setBackground('#0f380f');
  sh.setRowHeight(3, 6);

  // ── Build summary numbers from data ──
  var jobs = data.jobs || [];
  var invoices = data.invoices || [];
  var expenses = data.expenses || [];
  var mileage = data.mileage || [];

  var totalEarned = 0, outstanding = 0, totalExpenses = 0, totalMileageClaim = 0;
  var totalJobs = jobs.length;
  var paidCount = 0, draftCount = 0;

  invoices.forEach(function(row) {
    var amt = parseFloat(row[4]) || 0;
    var status = (row[5] || '').toLowerCase();
    if (status === 'paid') { totalEarned += amt; paidCount++; }
    else if (status === 'sent' || status === 'overdue') outstanding += amt;
    else if (status === 'draft') draftCount++;
  });
  expenses.forEach(function(row) { totalExpenses += parseFloat(row[3]) || 0; });
  mileage.forEach(function(row) { totalMileageClaim += parseFloat(row[7]) || 0; });
  var netProfit = totalEarned - totalExpenses - totalMileageClaim;

  function heroCell(sh, row, col, label, value, bg, fg) {
    sh.setRowHeight(row, 18);
    sh.setRowHeight(row + 1, 52);
    sh.setRowHeight(row + 2, 22);
    sh.setRowHeight(row + 3, 8);
    sh.getRange(row, col).merge().setValue(label)
      .setBackground(bg).setFontColor(fg).setFontSize(8)
      .setHorizontalAlignment('center').setFontWeight('bold');
    sh.getRange(row + 1, col).merge().setValue(value)
      .setBackground(bg).setFontColor(fg).setFontSize(22).setFontWeight('bold')
      .setHorizontalAlignment('center').setVerticalAlignment('middle');
    sh.getRange(row + 2, col).merge().setBackground(bg);
    sh.getRange(row + 3, col).merge().setBackground('#ffffff');
  }

  function fmt(n) { return '£' + Math.max(0, n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

  // ── Row of hero cards ──
  sh.setRowHeight(4, 12);
  var heroRow = 5;
  var heroColor = '#0f380f';
  var heroFg = '#c4d96b';

  // Earned
  heroCell(sh, heroRow, 2, 'TOTAL EARNED', fmt(totalEarned), heroColor, heroFg);
  // Outstanding
  var outBg = outstanding > 0 ? '#e65100' : '#1b5e20';
  heroCell(sh, heroRow, 3, 'OUTSTANDING', fmt(outstanding), outBg, '#ffffff');
  // Net Profit
  var netBg = netProfit >= 0 ? '#1b5e20' : '#b71c1c';
  heroCell(sh, heroRow, 4, 'NET PROFIT', fmt(netProfit), netBg, '#ffffff');
  // Jobs Done
  heroCell(sh, heroRow, 5, 'JOBS DONE', totalJobs, '#37474f', '#eceff1');

  sh.setRowHeight(heroRow + 4, 12); // gap after hero

  // ── Second row of stat boxes ──
  var row2 = heroRow + 5;
  function statBox(sh, row, col, label, value, bg) {
    sh.setRowHeight(row, 20);
    sh.setRowHeight(row + 1, 36);
    sh.setRowHeight(row + 2, 10);
    sh.getRange(row, col).setValue(label)
      .setBackground(bg).setFontColor('#666666').setFontSize(7)
      .setHorizontalAlignment('center').setFontWeight('bold');
    sh.getRange(row + 1, col).setValue(value)
      .setBackground(bg).setFontColor('#111111').setFontSize(14).setFontWeight('bold')
      .setHorizontalAlignment('center').setVerticalAlignment('middle');
    sh.getRange(row + 2, col).setBackground(bg);
  }
  statBox(sh, row2, 2, 'TOTAL EXPENSES', fmt(totalExpenses), '#fff3e0');
  statBox(sh, row2, 3, 'MILEAGE CLAIMS', fmt(totalMileageClaim), '#e3f2fd');
  statBox(sh, row2, 4, 'PAID INVOICES', paidCount, '#e8f5e9');
  statBox(sh, row2, 5, 'UNPAID / DRAFT', outstanding > 0 ? draftCount + ' draft · ' + fmt(outstanding) + ' owed' : draftCount + ' draft', '#fce4ec');

  sh.setRowHeight(row2 + 3, 16);

  // ── Monthly summary table ──
  var tRow = row2 + 4;
  sh.getRange(tRow, 1, 1, 6).merge()
    .setValue('MONTHLY INCOME SUMMARY')
    .setBackground('#306230').setFontColor('#c4d96b').setFontWeight('bold')
    .setFontSize(10).setHorizontalAlignment('center');
  sh.setRowHeight(tRow, 32);

  var mHeaders = ['MONTH','EARNED £','OUTSTANDING £','EXPENSES £','MILEAGE £','NET £'];
  var mHdrRange = sh.getRange(tRow + 1, 1, 1, 6);
  mHdrRange.setValues([mHeaders])
    .setBackground('#8bac0f').setFontColor('#0f380f').setFontWeight('bold')
    .setFontSize(8).setHorizontalAlignment('center');
  sh.setRowHeight(tRow + 1, 24);

  var plRows = data.pl || [];
  var displayRows = plRows.slice(0, 12); // last 12 months
  displayRows.forEach(function(row, ri) {
    var bgRow = ri % 2 === 0 ? '#f9fff5' : '#ffffff';
    var dataRow = sh.getRange(tRow + 2 + ri, 1, 1, 6);
    var net = parseFloat(row[5]) || 0;
    dataRow.setValues([row.slice(0, 6)])
      .setBackground(bgRow).setFontSize(9).setHorizontalAlignment('center');
    if (net < 0) sh.getRange(tRow + 2 + ri, 6).setFontColor('#c62828').setFontWeight('bold');
    else if (net > 0) sh.getRange(tRow + 2 + ri, 6).setFontColor('#2e7d32').setFontWeight('bold');
    sh.setRowHeight(tRow + 2 + ri, 20);
    // Format currency cols
    [2,3,4,5,6].forEach(function(c){
      sh.getRange(tRow + 2 + ri, c).setNumberFormat('£#,##0.00');
    });
  });

  // Border around monthly table
  if (displayRows.length > 0) {
    sh.getRange(tRow, 1, 2 + displayRows.length, 6)
      .setBorder(true, true, true, true, true, true,
        '#cccccc', SpreadsheetApp.BorderStyle.SOLID);
  }

  // ── Last updated ──
  var lastRow = tRow + 2 + displayRows.length + 1;
  sh.getRange(lastRow, 1, 1, 6).merge()
    .setValue('Last synced: ' + new Date().toLocaleString('en-GB'))
    .setFontSize(7).setFontColor('#999999').setHorizontalAlignment('right')
    .setBackground('#ffffff');
}

// ── PHOTO UPLOAD ──────────────────────────────────
function uploadPhoto(data) {
  // data.subfolder: 'Business Expenses' or 'PODs/Client Name'
  var root = getRootFolder();
  var parts = (data.subfolder || 'Business Expenses').split('/');
  var folder = root;
  for (var i = 0; i < parts.length; i++) {
    if (parts[i]) folder = getOrCreateFolder(parts[i], folder);
  }
  var bytes = Utilities.base64Decode(data.base64);
  var blob = Utilities.newBlob(bytes, data.mimeType || 'image/jpeg', data.filename || 'photo.jpg');
  var file = folder.createFile(blob);
  file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
  return respond({ok: true, url: file.getUrl(), id: file.getId()});
}

// ── INVOICE DOC ───────────────────────────────────
function createInvoiceDoc(data) {
  var inv = data.invoice;
  var biz = data.biz;
  var root = getRootFolder();
  var invRoot = getOrCreateFolder('Invoices', root);
  // Sub-folder per client
  var clientFolder = getOrCreateFolder(inv.clientName || 'One-off', invRoot);

  var docTitle = inv.number + ' — ' + (inv.clientName || 'Invoice') + ' — ' + (inv.issueDate || '');
  var doc = DocumentApp.create(docTitle);
  var body = doc.getBody();
  body.clear();

  var normal = {};
  normal[DocumentApp.Attribute.FONT_SIZE] = 10;
  normal[DocumentApp.Attribute.FONT_FAMILY] = 'Arial';

  // ── Business header ──
  var h1 = body.appendParagraph(biz.bizName || 'Odd Socks Deliveries');
  h1.setHeading(DocumentApp.ParagraphHeading.HEADING1);
  h1.editAsText().setForegroundColor('#0f380f');
  if (biz.bizAddr) {
    biz.bizAddr.split('\\n').forEach(function(line) {
      if (line.trim()) body.appendParagraph(line).setAttributes(normal);
    });
  }
  if (biz.bizPhone) body.appendParagraph('Tel: ' + biz.bizPhone).setAttributes(normal);
  if (biz.bizEmail) body.appendParagraph(biz.bizEmail).setAttributes(normal);
  body.appendParagraph('');

  // ── Invoice ref block ──
  var invHdr = body.appendParagraph('INVOICE ' + inv.number);
  invHdr.setHeading(DocumentApp.ParagraphHeading.HEADING2);
  invHdr.editAsText().setForegroundColor('#0f380f');
  body.appendParagraph('Issued: ' + inv.issueDate).setAttributes(normal);
  body.appendParagraph('Due: ' + inv.dueDate).setAttributes(normal);
  body.appendParagraph('');

  // ── Bill to ──
  var billTo = body.appendParagraph('BILL TO');
  billTo.setHeading(DocumentApp.ParagraphHeading.HEADING3);
  billTo.editAsText().setForegroundColor('#306230');
  body.appendParagraph(inv.clientName || '').editAsText().setBold(true);
  if (inv.clientAddr) body.appendParagraph(inv.clientAddr).setAttributes(normal);
  if (inv.clientEmail) body.appendParagraph(inv.clientEmail).setAttributes(normal);
  body.appendParagraph('');

  // ── Line items table ──
  var table = body.appendTable();
  var hRow = table.appendTableRow();
  ['DESCRIPTION', 'DATE', 'AMOUNT'].forEach(function(h) {
    var cell = hRow.appendTableCell(h);
    cell.editAsText().setBold(true).setForegroundColor('#c4d96b').setBackgroundColor('#0f380f');
    cell.setPaddingTop(4).setPaddingBottom(4);
  });
  (inv.lineItems || []).forEach(function(item, i) {
    var row = table.appendTableRow();
    row.appendTableCell(item.description || '');
    row.appendTableCell(item.date || '');
    var amtCell = row.appendTableCell('\\u00a3' + (parseFloat(item.amount) || 0).toFixed(2));
    if (i % 2 === 0) {
      [0,1,2].forEach(function(ci) {
        row.getCell(ci).setBackgroundColor('#f5f8f0');
      });
    }
  });
  // Total row
  var totRow = table.appendTableRow();
  var totLbl = totRow.appendTableCell('TOTAL');
  totLbl.editAsText().setBold(true);
  totRow.appendTableCell('');
  var totAmt = totRow.appendTableCell('\\u00a3' + (parseFloat(inv.total) || 0).toFixed(2));
  totAmt.editAsText().setBold(true).setForegroundColor('#0f380f').setFontSize(12);

  body.appendParagraph('');

  // ── Payment / terms ──
  if (biz.bizBank) {
    var payHdr = body.appendParagraph('Payment details');
    payHdr.editAsText().setBold(true);
    body.appendParagraph(biz.bizBank).setAttributes(normal);
  }
  body.appendParagraph('Payment terms: ' + (inv.paymentTerms || 14) + ' days from invoice date').setAttributes(normal);
  if (inv.notes) body.appendParagraph('Note: ' + inv.notes).setAttributes(normal);
  if (biz.lateFee) {
    body.appendParagraph('');
    body.appendParagraph(biz.lateFee).editAsText().setItalic(true).setFontSize(8);
  }
  body.appendParagraph('');
  body.appendParagraph('Thank you for your business.').editAsText().setItalic(true);

  doc.saveAndClose();

  // Move into correct Drive folder
  var docFile = DriveApp.getFileById(doc.getId());
  clientFolder.addFile(docFile);
  try { DriveApp.getRootFolder().removeFile(docFile); } catch(e) {}
  docFile.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);

  return respond({ok: true, url: doc.getUrl(), id: doc.getId(), docTitle: docTitle});
}`;
}
