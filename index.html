<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Odd Socks</title>
<link id="manifest-link" rel="manifest">
<meta name="theme-color" content="#0f380f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Odd Socks">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated}
:root{
  --gb0:#0f380f;--gb1:#306230;--gb2:#8bac0f;--gb3:#9bbc0f;--gb4:#c4d96b;--gb5:#e8f0c8;
  --red:#d03030;--yellow:#c49000;--px:'Press Start 2P',monospace
}
body{background:var(--gb0);font-family:var(--px);color:var(--gb3);font-size:12px;line-height:1.5;overflow-x:hidden}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--gb0);border-left:4px solid var(--gb1);border-right:4px solid var(--gb1);position:relative}
.app::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:998}

/* ═══ CLEAN MODE — MIDNIGHT GOLD ═══ */
body.clean{
  --gb0:#0c0c14;--gb1:#161622;--gb2:#b8943f;--gb3:#c8c0b5;--gb4:#f0ece4;--gb5:#1e1e2c;
  --red:#e05252;--yellow:#d4a843;--px:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px;background:#0c0c14;
}
body.clean *{image-rendering:auto;letter-spacing:0}
body.clean .app{border:none;background:#0c0c14}
body.clean .app::after{display:none}
body.clean .hdr{background:#0e0e1a;border-bottom:1px solid #b8943f}
body.clean .hdr-info h1{text-shadow:none;font-size:13px;letter-spacing:0.5px}
body.clean .hdr-info p{color:#6a6258}
body.clean .hdr-socks{animation:none}
body.clean .hdr-badge{background:#1e1e2c;border-color:#b8943f;color:#f0ece4}
body.clean .tabs{background:#0e0e1a;border-bottom:1px solid #b8943f;top:52px}
body.clean .tab{font-size:11px;color:#6a6258;padding:10px 1px}
body.clean .tab.on{color:#f0ece4;background:#1e1e2c}
body.clean .card,.clean .cc,.clean .inv-item{border-radius:10px;border-width:1px}
body.clean .btn{border-radius:6px;font-size:15px;padding:12px 18px}
body.clean .btn.big{border-radius:8px;font-size:17px;padding:16px 18px}
body.clean .field input,.clean .field textarea,.clean .field select{border-radius:6px;font-size:14px;border-width:1px;color-scheme:dark}
body.clean .modal{border-radius:14px 14px 0 0;border-width:1px}
body.clean .m-title{font-size:17px}
body.clean .c-name{font-size:15px}
body.clean .c-addr,.clean .c-client,.clean .c-notes,.clean .c-due{font-size:13px}
body.clean .c-price{font-size:16px}
body.clean .hdr-info h1::after{content:' ✦';font-size:10px;opacity:.5}
body.clean .theme-btn{background:#1e1e2c!important;color:#6a6258!important}

/* HEADER */
.hdr{background:var(--gb1);border-bottom:4px solid var(--gb2);padding:12px 16px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;isolation:isolate}
.hdr-socks{font-size:22px;cursor:pointer;animation:wob 3s ease-in-out infinite;user-select:none;-webkit-user-select:none}
@keyframes wob{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.hdr-info h1{font-size:11px;color:var(--gb4);letter-spacing:1px;text-shadow:2px 2px 0 var(--gb0)}
.hdr-info p{font-size:9px;color:var(--gb2);margin-top:3px}
.hdr-badge{margin-left:auto;background:var(--gb0);color:var(--gb3);padding:5px 9px;font-size:9px;border:2px solid var(--gb2);white-space:nowrap}

/* TABS */
.tabs{display:grid;grid-template-columns:repeat(6,1fr);background:var(--gb0);border-bottom:4px solid var(--gb1);position:sticky;top:57px;z-index:99;isolation:isolate}
.tab{padding:10px 1px;text-align:center;font-size:10px;color:var(--gb2);cursor:pointer;border:none;background:none;font-family:var(--px);border-right:2px solid var(--gb1);line-height:1.6}
.tab:last-child{border-right:none}
.tab.on{color:var(--gb4);background:var(--gb1)}
.tab-ic{font-size:18px;display:block;margin-bottom:4px}

/* CONTENT */
.content{padding:12px;padding-bottom:calc(100px + env(safe-area-inset-bottom,0px))}

/* FAB */
.fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom,0px));right:20px;width:50px;height:50px;background:var(--gb3);border:3px solid var(--gb4);color:var(--gb0);font-size:24px;font-family:var(--px);cursor:pointer;z-index:200;display:flex;align-items:center;justify-content:center;box-shadow:4px 4px 0 var(--gb1)}
.fab:active{box-shadow:2px 2px 0 var(--gb1);transform:translate(2px,2px)}
.job-bar{position:fixed;bottom:env(safe-area-inset-bottom,0px);left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:grid;grid-template-columns:1fr 1fr;background:var(--gb0);border-top:4px solid var(--gb2);z-index:201}
.job-bar-btn{background:var(--gb1);color:var(--gb4);font-family:var(--px);font-size:9px;border:none;border-right:2px solid var(--gb2);padding:12px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px}
.job-bar-btn:last-child{border-right:none}
.job-bar-btn:active{background:var(--gb2);color:var(--gb0)}
.job-bar-ic{font-size:18px}

/* CARDS */
.card{background:var(--gb1);border:3px solid var(--gb2);margin-bottom:12px;padding:12px;position:relative}
.card.urg{border-color:var(--red);border-style:solid;background:rgba(208,48,48,0.2)}
.card.warn{border-color:var(--yellow);border-style:dashed;background:rgba(196,144,0,0.18)}
.card.ok{border-style:dotted;background:var(--gb1)}
.card.collect-ph{border-color:var(--yellow);border-style:dashed;background:rgba(196,144,0,0.18)}
.card.collected{border-color:#4a8fd4;border-style:solid;background:rgba(74,143,212,0.18)}
.card.done-card{border-color:var(--gb3);border-style:solid;background:rgba(155,188,15,0.15);opacity:1}
.ci{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px}
.c-icon{font-size:20px;flex-shrink:0}
.c-meta{flex:1;min-width:0}
.c-name{font-size:16px;color:var(--gb4);line-height:1.4;word-break:break-word}
.c-client{font-size:13px;color:var(--gb2);margin-top:2px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot.r{background:var(--red);box-shadow:0 0 5px var(--red)}
.dot.y{background:var(--yellow);box-shadow:0 0 5px var(--yellow)}
.dot.g{background:var(--gb3)}
.c-addr{font-size:13px;color:var(--gb2);line-height:2;margin-bottom:5px}
.c-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.c-due{font-size:13px;color:var(--gb4)}
.c-price{font-size:16px;color:var(--gb3);font-weight:bold}
.c-notes{font-size:13px;color:var(--gb2);font-style:italic;margin-bottom:7px;line-height:1.8}
.c-acts{display:flex;gap:5px;flex-wrap:wrap}

/* CLIENT CARDS */
.cc{background:var(--gb1);border:3px solid var(--gb2);margin-bottom:12px;padding:12px;cursor:pointer}
.cc:active{background:var(--gb2)}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cc-icon{font-size:22px}
.cc-info{flex:1}
.cc-name{font-size:14px;color:var(--gb4);margin-bottom:3px}
.cc-sub{font-size:12px;color:var(--gb2);line-height:1.9}
.cc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.cc-stat{background:var(--gb0);border:2px solid var(--gb1);padding:5px 4px;text-align:center}
.cc-stat-num{font-size:13px;color:var(--gb4);display:block}
.cc-stat-lbl{font-size:10px;color:var(--gb2);display:block;margin-top:1px}
.cc-acts{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}

/* CLIENT PROFILE */
.profile-hdr{background:var(--gb1);border:3px solid var(--gb2);padding:12px;margin-bottom:10px}
.profile-name{font-size:13px;color:var(--gb4);margin-bottom:8px;line-height:1.4}
.profile-contact{font-size:13px;color:var(--gb2);line-height:2.2;margin-bottom:8px}
.profile-acts{display:flex;gap:5px;flex-wrap:wrap}
.section{margin-bottom:14px}
.section-title{font-size:13px;color:var(--gb4);border-bottom:2px solid var(--gb1);padding-bottom:5px;margin-bottom:8px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.stat-box{background:var(--gb1);border:3px solid var(--gb2);padding:10px;text-align:center}
.stat-num{font-size:16px;color:var(--gb4);display:block;margin-bottom:4px}
.stat-lbl{font-size:12px;color:var(--gb2)}
.stat-box.highlight{border-color:var(--gb3)}
.stat-box.danger{border-color:var(--red)}

/* MONEY TAB */
.pl-box{background:var(--gb1);border:3px solid var(--gb2);padding:12px;margin-bottom:10px}
.pl-toggle{display:grid;grid-template-columns:1fr 1fr;gap:0;margin-bottom:10px;border:2px solid var(--gb2)}
.pl-btn{background:var(--gb0);color:var(--gb2);font-family:var(--px);font-size:12px;padding:7px;border:none;cursor:pointer;text-align:center}
.pl-btn.on{background:var(--gb2);color:var(--gb0)}
.pl-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--gb1);font-size:12px}
.pl-row:last-child{border-bottom:none}
.pl-row.total{font-size:14px;color:var(--gb4);padding-top:8px;border-bottom:none}
.pl-row.total.pos{color:var(--gb3)}
.pl-row.total.neg{color:var(--red)}
.pl-label{color:var(--gb2)}
.pl-val{color:var(--gb4)}
.pl-val.pos{color:var(--gb3)}
.pl-val.neg{color:var(--red)}

/* EXPENSE CATS */
.exp-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.exp-cat{background:var(--gb1);border:2px solid var(--gb2);color:var(--gb3);font-family:var(--px);font-size:11px;padding:10px 4px;cursor:pointer;text-align:center;line-height:2}
.exp-cat .ec-ic{font-size:16px;display:block;margin-bottom:3px}
.exp-cat:active{background:var(--gb2);color:var(--gb0)}
.exp-cat.on{background:var(--gb2);color:var(--gb0);border-color:var(--gb4)}

/* EXPENSE ITEMS */
.exp-item{background:var(--gb1);border:2px solid var(--gb2);padding:9px;margin-bottom:7px;display:flex;align-items:center;gap:9px}
.exp-badge{background:var(--gb0);border:2px solid var(--gb2);font-size:11px;color:var(--gb2);padding:3px 5px;white-space:nowrap}
.exp-desc{flex:1;font-size:12px;color:var(--gb3);line-height:1.8}
.exp-amt{font-size:14px;color:var(--gb4);white-space:nowrap}
.exp-date{font-size:11px;color:var(--gb2)}

/* INVOICE ITEMS */
.inv-item{background:var(--gb1);border:3px solid var(--gb2);padding:10px;margin-bottom:8px}
.inv-item.paid{border-color:var(--gb3);opacity:.7}
.inv-item.overdue{border-color:var(--red)}
.inv-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.inv-num{font-size:14px;color:var(--gb4);flex-shrink:0}
.inv-client{font-size:12px;color:var(--gb3);flex:1}
.inv-total{font-size:15px;color:var(--gb4)}
.inv-meta{font-size:11px;color:var(--gb2);line-height:2;margin-bottom:6px}
.status-badge{display:inline-block;font-size:11px;padding:2px 6px;border:2px solid;margin-bottom:6px}
.status-draft{color:var(--gb2);border-color:var(--gb2)}
.status-sent{color:var(--yellow);border-color:var(--yellow)}
.status-paid{color:var(--gb3);border-color:var(--gb3)}
.status-overdue{color:var(--red);border-color:var(--red)}
.inv-acts{display:flex;gap:5px;flex-wrap:wrap}

/* BUTTONS */
.btn{background:var(--gb0);color:var(--gb3);border:2px solid var(--gb2);padding:11px 13px;font-size:13px;font-family:var(--px);cursor:pointer;white-space:nowrap}
.btn:active{background:var(--gb2);color:var(--gb0)}
.btn.ld{background:var(--gb2);color:var(--gb0)}
.btn.dn{background:var(--gb3);color:var(--gb0);border-color:var(--gb3)}
.btn.dl{border-color:var(--red);color:var(--red)}
.btn.big{background:var(--gb2);color:var(--gb0);padding:14px 12px;font-size:15px;width:100%;margin-top:6px;border:2px solid var(--gb4);display:block;text-align:center;cursor:pointer;font-family:var(--px)}
.btn.big:active{background:var(--gb4)}
.btn.big.sec{background:var(--gb1);color:var(--gb4);border-color:var(--gb2)}
.btn.big.dl{background:var(--gb0);color:var(--red);border-color:var(--red)}
.btn.sm{padding:10px 12px;font-size:13px}
.back-btn{background:var(--gb0);color:var(--gb2);border:2px solid var(--gb1);padding:10px 12px;font-size:12px;font-family:var(--px);cursor:pointer;margin-bottom:10px}

/* MODAL */
.ov{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--gb0);border:4px solid var(--gb2);border-bottom:none;width:100%;max-width:480px;max-height:93vh;overflow-y:auto;padding:16px}
.m-title{font-size:16px;color:var(--gb4);margin-bottom:14px}
.m-sub{font-size:12px;color:var(--gb2);margin-bottom:12px;line-height:1.9}

/* FORMS */
.field{margin-bottom:10px}
.field label{display:block;font-size:12px;color:var(--gb2);margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;background:var(--gb1);border:2px solid var(--gb2);color:var(--gb4);font-family:var(--px);font-size:14px;padding:8px;outline:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gb4)}
.field textarea{min-height:60px;resize:vertical;line-height:1.7}
.field input[type=date]{color-scheme:dark}
.field input[type=number]{-moz-appearance:textfield}
.frow{display:flex;gap:8px}
.frow .field{flex:1}
.icon-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.ic-opt{font-size:18px;cursor:pointer;padding:4px;border:2px solid transparent}
.ic-opt.sel{border-color:var(--gb4);background:var(--gb1)}
.modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
.mode{background:var(--gb1);border:2px solid var(--gb2);color:var(--gb3);font-family:var(--px);font-size:11px;padding:10px 4px;cursor:pointer;text-align:center;line-height:2}
.mode .mi{font-size:16px;display:block;margin-bottom:3px}
.mode:active,.mode.on{background:var(--gb2);color:var(--gb0);border-color:var(--gb4)}
.ab{background:var(--gb0);border:2px solid var(--gb1);padding:10px;margin-bottom:10px}
.ab-lbl{font-size:12px;color:var(--gb4);margin-bottom:7px}
.see-more{background:none;border:none;color:var(--gb2);font-family:var(--px);font-size:11px;cursor:pointer;margin-bottom:5px;padding:0}

/* LOADING / MESSAGES */
.loading{text-align:center;padding:28px 10px}
.loading p{font-size:13px;color:var(--gb3);animation:bl 1s step-end infinite;line-height:2}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.ok-msg{font-size:12px;color:var(--gb3);margin-bottom:8px;padding:7px 10px;border-left:3px solid var(--gb3);line-height:1.9}
.err-msg{font-size:12px;color:var(--red);margin-bottom:8px;padding:7px 10px;border-left:3px solid var(--red);line-height:1.9}
.warn-bar{background:var(--gb1);border:2px solid var(--yellow);padding:8px 10px;margin-bottom:10px;font-size:12px;color:var(--yellow);line-height:2}
.empty{text-align:center;padding:40px 16px;color:var(--gb2);font-size:13px;line-height:2.4}
.empty-ic{font-size:32px;display:block;margin-bottom:12px}

/* POD THUMB */
.pod-thumb{width:100%;max-height:140px;object-fit:cover;border:3px solid var(--gb2);display:block;margin:8px 0}

/* LINE ITEM EDITOR */
.li-row{display:flex;gap:5px;align-items:center;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--gb1)}
.li-desc{flex:1;background:var(--gb1);border:2px solid var(--gb2);color:var(--gb4);font-family:var(--px);font-size:13px;padding:6px 7px}
.li-amt{width:75px;background:var(--gb1);border:2px solid var(--gb2);color:var(--gb4);font-family:var(--px);font-size:13px;padding:6px 7px}
.li-total{font-size:13px;color:var(--gb4);width:50px;text-align:right}

/* ROUTE */
.rc{background:var(--gb1);border:3px solid var(--gb2);padding:10px;margin-bottom:8px}
.rc-num{font-size:14px;color:var(--gb4);margin-bottom:3px}
.rc-name{font-size:13px;color:var(--gb3);margin-bottom:4px}
.rc-addr{font-size:12px;color:var(--gb2);line-height:2}

/* SETTINGS */
.set-s{margin-bottom:16px}
.set-t{font-size:14px;color:var(--gb4);margin-bottom:10px;border-bottom:2px solid var(--gb1);padding-bottom:6px}
.set-note{font-size:12px;color:var(--gb2);line-height:2;margin-bottom:8px}

/* WORLD OVERLAY (easter egg) */
.world-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--gb0);z-index:600;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10px}
.world-close{background:var(--gb1);border:2px solid var(--gb2);color:var(--gb2);font-family:var(--px);font-size:10px;padding:6px 12px;cursor:pointer;margin-bottom:8px}
.ww{display:flex;flex-direction:column;align-items:center}
.wcanvas{border:4px solid var(--gb2);display:block;image-rendering:pixelated}
.wcontrols{display:flex;align-items:center;gap:20px;margin-top:10px}
.dpad{display:grid;grid-template-columns:repeat(3,44px);grid-template-rows:repeat(3,44px);gap:2px}
.dpbtn{background:var(--gb1);border:3px solid var(--gb2);color:var(--gb4);font-family:var(--px);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none;-webkit-user-select:none}
.dpbtn:active{background:var(--gb2);color:var(--gb0)}
.dpad-center{background:var(--gb1);border:2px solid var(--gb2);display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--gb3)}
.abtn{background:var(--gb3);border:3px solid var(--gb4);color:var(--gb0);font-family:var(--px);font-size:10px;width:52px;height:52px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;touch-action:none;user-select:none;-webkit-user-select:none}
.abtn:active{background:var(--gb4)}



/* TODAY/CALENDAR TAB */
.tc{background:var(--gb1);border:3px solid var(--gb2);margin-bottom:12px;padding:12px}
.tc.tc-confirmed{border-color:var(--gb3)}
.tc.tc-rescheduled{border-color:var(--yellow);border-style:dashed}
.tc.tc-eta_sent{border-color:var(--gb4)}
.tc-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.tc-icon{font-size:24px;flex-shrink:0}
.tc-info{flex:1;min-width:0}
.tc-name{font-size:12px;color:var(--gb4);line-height:1.4;word-break:break-word}
.tc-client{font-size:10px;color:var(--gb2);margin-top:4px}
.tc-badge{font-size:8px;padding:4px 8px;border:2px solid;white-space:nowrap;align-self:flex-start;margin-top:2px}
.tc-badge.unconfirmed{color:var(--yellow);border-color:var(--yellow)}
.tc-badge.confirmed{color:var(--gb3);border-color:var(--gb3)}
.tc-badge.rescheduled{color:var(--yellow);border-color:var(--yellow)}
.tc-badge.eta_sent{color:var(--gb4);border-color:var(--gb4)}
.tc-time-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tc-time{background:var(--gb0);border:2px solid var(--gb2);color:var(--gb4);font-family:var(--px);font-size:14px;padding:8px 10px;width:110px}
.tc-addr{font-size:9px;color:var(--gb2);flex:1;line-height:1.9}
.tc-acts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.tc-acts-row{display:flex;gap:6px;margin-bottom:8px}
.tc-log{border-top:1px solid var(--gb0);padding-top:7px;margin-top:4px}

// ═══════════════════════════════════
// UTILS
// ═══════════════════════════════════
const today=()=>new Date().toISOString().split('T')[0];
function addDays(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0]}
function daysUntil(d){if(!d)return 999;return Math.ceil((new Date(d+' 00:00:00')-new Date(today()+' 00:00:00'))/(864e5))}
function urgency(item){const d=daysUntil(item.dueDate);return d<0?'r':d<=2?'y':'g'}
function fmtD(s){if(!s)return'';try{return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}catch(e){return s}}
function fmtDShort(s){if(!s)return'';try{return new Date(s+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'})}catch(e){return s}}
function fmtCur(n){return'£'+(parseFloat(n)||0).toFixed(2)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function jobAddr(item,type){return[item[type+'Num'],item[type+'Street'],item[type+'Post']].filter(Boolean).join(' ')}
function getClient(id){return S.clients.find(c=>c.id===id)}
function extractPost(addr){if(!addr)return'';const m=(addr||'').match(/[A-Z]{1,2}[0-9][0-9A-Z]?\s*[0-9][A-Z]{2}/i);return m?m[0].toUpperCase().trim():'';}
function clientPost(c){return c.postcode||extractPost(c.addr)||''}
function clientLocations(id){return(getClient(id)||{}).locations||[]}
function extractPost(addr){if(!addr)return'';const m=(addr||'').match(/[A-Z]{1,2}[0-9][0-9A-Z]?\s*[0-9][A-Z]{2}/i);return m?m[0].toUpperCase().trim():'';}
function clientPost(c){return c.postcode||extractPost(c.addr)||''}
function clientLocations(id){return(getClient(id)||{}).locations||[]}
function clientName(id){return id?((getClient(id)||{}).name||'Unknown Client'):'One-off'}

function taxYearRange(){

function getPL(period){

    const n=new Date();
    start=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-01`;
  }else{
    start=taxYearRange().start;
  }
  const paidInvs=S.invoices.filter(i=>i.status==='paid'&&i.paidDate&&i.paidDate>=start);
  const sentInvs=S.invoices.filter(i=>i.status==='sent'&&i.issueDate&&i.issueDate>=start);
  const overdue=S.invoices.filter(i=>i.status==='overdue'||(i.status==='sent'&&i.dueDate<today()));
  const exps=S.expenses.filter(e=>e.date&&e.date>=start);
  const doneJobs=S.jobs.filter(j=>j.status==='done'&&j.completedDate&&j.completedDate>=start&&j.miles>0);
  const totalPaid=paidInvs.reduce((s,i)=>s+(i.total||0),0);
  const totalOut=sentInvs.reduce((s,i)=>s+(i.total||0),0);
  const totalExp=exps.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const totalMiles=doneJobs.reduce((s,j)=>s+(j.miles||0),0);
  const mileClaim=totalMiles*(S.settings.mileageRate||0.45);
  return{totalPaid,totalOut,overdue:overdue.length,totalExp,totalMiles,mileClaim,net:totalPaid-totalExp-mileClaim};
}

async function compressImg(file,maxW=900){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const ratio=Math.min(1,maxW/img.width);
        const c=document.createElement('canvas');
        c.width=img.width*ratio;c.height=img.height*ratio;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',0.75));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}
function dataURLtoFile(dataURL,filename){
  const arr=dataURL.split(','),mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]);let n=bstr.length;const u=new Uint8Array(n);
  while(n--)u[n]=bstr.charCodeAt(n);
  return new File([u],filename,{type:mime});
}

function rCalendar(){
  const now=new Date();
  if(S.calMonth===null||S.calMonth===undefined){S.calMonth=now.getMonth();S.calYear=now.getFullYear();}
  const vy=S.calYear,vm=S.calMonth;
  const firstDay=new Date(vy,vm,1);
  const lastDay=new Date(vy,vm+1,0);
  const startDow=(firstDay.getDay()+6)%7; // 0=Mon

  const jobsByDate={};
  const pickupByDate={};
  S.jobs.filter(j=>j.status!=='done').forEach(j=>{
    if(j.dueDate){if(!jobsByDate[j.dueDate])jobsByDate[j.dueDate]=[];jobsByDate[j.dueDate].push(j);}
    if(j.pickDate&&j.pickDate!==j.dueDate){if(!pickupByDate[j.pickDate])pickupByDate[j.pickDate]=[];pickupByDate[j.pickDate].push(j);}
  });

  const td=today();
  const MONTHS=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const DAYS=['MO','TU','WE','TH','FR','SA','SU'];

  let cells=DAYS.map(d=>`<div style="text-align:center;font-size:9px;color:var(--gb2);padding:5px 0">${d}</div>`).join('');
  for(let i=0;i<startDow;i++)cells+='<div></div>';

  for(let d=1;d<=lastDay.getDate();d++){
    const ds=`${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const jobs=jobsByDate[ds]||[];
    const pickups=pickupByDate[ds]||[];
    const totalCount=jobs.length+pickups.length;
    const isToday=ds===td, isPast=ds<td, isSel=ds===S.calSelected;
    const unconf=jobs.filter(j=>!j.commsStatus||j.commsStatus==='unconfirmed'||j.commsStatus==='rescheduled').length;
    const ok=jobs.filter(j=>j.commsStatus==='confirmed'||j.commsStatus==='eta_sent').length;
    const clickable=(!isPast||totalCount);
    let cls='cal-day'+(totalCount?' has-jobs':'')+(isToday?' is-today':'')+(isSel?' is-selected':'')+(isPast&&!totalCount?' is-past':'')+(clickable&&!totalCount?' is-clickable':'');
    cells+=`<div class="${cls}" onclick="${clickable?`selectCalDay('${ds}')`:''}" >
      <div class="cal-day-num">${d}</div>
      ${totalCount?`<div class="cal-day-count">${totalCount}</div>
      <div class="cal-dots">
        ${pickups.length>0?`<div style="width:6px;height:6px;background:var(--gb2);border-radius:50%;border:1px solid var(--gb3)" title="collections"></div>`:''}
        ${unconf>0?`<div style="width:6px;height:6px;background:var(--yellow);border-radius:50%"></div>`:''}
        ${ok>0?`<div style="width:6px;height:6px;background:var(--gb3);border-radius:50%"></div>`:''}
      </div>`:''}
    </div>`;
  }

  let html=`
    <div style="background:var(--gb1);border:3px solid var(--gb2);padding:12px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button class="btn sm" onclick="navCalMonth(-1)" style="padding:10px 16px;font-size:16px">◀</button>
        <div style="flex:1;text-align:center;font-size:14px;color:var(--gb4)">${MONTHS[vm]} ${vy}</div>
        <button class="btn sm" onclick="navCalMonth(1)" style="padding:10px 16px;font-size:16px">▶</button>
      </div>
      <div class="cal-grid">${cells}</div>
    </div>`;

  const showDate=S.calSelected||(jobsByDate[td]?td:(pickupByDate[td]?td:null));
  if(showDate){
    const dayJobs=(jobsByDate[showDate]||[]).sort((a,b)=>(a.agreedTime||'23:59').localeCompare(b.agreedTime||'23:59'));
    const dayPickups=pickupByDate[showDate]||[];
    const total=dayJobs.length+dayPickups.length;
    if(total){
      const confirmed=dayJobs.filter(j=>j.commsStatus==='confirmed'||j.commsStatus==='eta_sent').length;
      const allConf=dayJobs.length>0&&confirmed===dayJobs.length;
      const mUrl=dayMapsUrl(showDate);
      html+=`<div style="background:var(--gb1);border:3px solid var(--gb2);padding:12px;margin-bottom:12px">
        <div style="font-size:14px;color:var(--gb4);margin-bottom:6px">${fmtD(showDate).toUpperCase()}</div>
        <div style="font-size:10px;color:var(--gb2);margin-bottom:10px">${total} JOB${total!==1?'S':''}${dayJobs.length?` · ${confirmed}/${dayJobs.length} CONFIRMED${allConf?' ✓':''}`:''} ${dayPickups.length?`· ${dayPickups.length} TO COLLECT`:''}</div>
        ${dayJobs.length?`<div style="background:var(--gb0);border:2px solid var(--gb2);height:10px;margin-bottom:10px">
          <div style="height:100%;background:${allConf?'var(--gb4)':'var(--gb3)'};width:${Math.round(confirmed/dayJobs.length*100)}%;transition:width .3s"></div>
        </div>`:''}
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${dayJobs.length&&!allConf?`<button class="btn sm" style="flex:1 1 120px" onclick="confirmAllOnDate('${showDate}')">✓ CONFIRM ALL</button>`:''}
          ${mUrl?`<a href="${mUrl}" target="_blank" class="btn sm" style="text-decoration:none;flex:1 1 120px;text-align:center">🗺️ ROUTE IN MAPS</a>`:''}
          <button class="btn sm" style="flex:1 1 120px" onclick="go('route')">📋 ROUTE TAB</button>
        </div>
      </div>`;
      html+=dayPickups.map(j=>rTodayCard(j,'pickup')).join('');
      html+=dayJobs.map(j=>rTodayCard(j,(j.pickDate&&j.pickDate===j.dueDate)?'both':'deliver')).join('');
    } else if(S.calSelected){
      html+=`<div style="text-align:center;padding:24px;color:var(--gb2);font-size:10px">NO JOBS ON<br>${fmtD(showDate).toUpperCase()}</div>`;
    }
  } else {
    html+=`<div class="empty"><span class="empty-ic">📅</span>NO JOBS TODAY<br><span style="font-size:9px">TAP A DAY TO SEE JOBS<br>ADD JOBS IN THE JOBS TAB</span></div>`;
  }
  return html;
}

function rJobs(){
  const items=S.jobs.filter(j=>j.status!=='done').sort((a,b)=>daysUntil(a.dueDate)-daysUntil(b.dueDate));

  const cards=items.map(item=>{
    const u=urgency(item),cName=clientName(item.clientId);
    const isMultiDay=item.pickDate&&item.pickDate!==item.dueDate;
    const collectPhase=isMultiDay&&item.status==='active';
    // ── PHASE 1: COLLECT ──────────────────────────────────────
    if(collectPhase){
      const pickAddr=jobAddr(item,'pick')||'?';
      const dp=daysUntil(item.pickDate);

      return`<div class="card collect-ph">
        <div class="ci">
          <span class="c-icon">${item.icon||'📦'}</span>
          <div class="c-meta">
            <div class="c-name">${esc(item.name)}</div>

          </div>

        </div>
        ${item.notes?`<div class="c-notes">${esc(item.notes)}</div>`:''}
        <div class="c-addr">↑ ${esc(pickAddr)}${item.pickTime?` · ⏰ ${item.pickTime}`:''}</div>
        <div style="font-size:11px;color:var(--gb2);margin-bottom:6px;line-height:2">→ THEN DELIVER: ${fmtD(item.dueDate||'')}</div>
        <div class="c-row">
          <div class="c-due" style="color:var(--yellow)">${pickLabel}</div>
          ${item.price?`<div class="c-price">${fmtCur(item.price)}</div>`:''}

          <button class="btn dl" onclick="delJob('${item.id}')">✕</button>
        </div>

    const d=daysUntil(item.dueDate);
    const dl=d<0?`OVERDUE ${Math.abs(d)}D`:d===0?'DUE TODAY':`${d}D LEFT`;
    const collected=item.status==='collected';
    const delAddr=jobAddr(item,'del')||'?';
    return`<div class="card ${u==='r'?'urg':u==='y'?'warn':'ok'} ${collected?'collected':''}">
      <div class="ci">

        <div class="c-meta">
          <div class="c-name">${esc(item.name)}</div>

        ${isMultiDay
          ?`<span style="font-size:10px;background:var(--gb3);color:var(--gb0);padding:3px 6px;white-space:nowrap">STEP 2/2 ↓ DELIVER</span>`
          :`<span class="dot ${u}"></span>`}
      </div>

      ${collected?`<div style="font-size:11px;color:var(--gb3);margin-bottom:4px">✓ COLLECTED${item.collectDate?' · '+fmtD(item.collectDate):''}</div>`:''}
      ${item.pod?`<div style="font-size:10px;color:var(--gb3);margin-bottom:4px">📸 POD${item.podDriveUrl?' · ☁️ IN DRIVE':' SAVED'}</div>`:''}

async function calcMilesAuto(){
  const job=S.jobs.find(j=>j.id===DF.jobId);
  if(!job)return;
  const el=document.getElementById('miles-est');
  if(el)el.textContent='Calculating...';
  try{
    const [r1,r2]=await Promise.all([
      fetch('https://api.postcodes.io/postcodes/'+encodeURIComponent(job.pickPost.replace(/\s/g,''))),
      fetch('https://api.postcodes.io/postcodes/'+encodeURIComponent(job.delPost.replace(/\s/g,'')))
    ]);
    const [d1,d2]=await Promise.all([r1.json(),r2.json()]);
    if(d1.status!==200||d2.status!==200){if(el)el.textContent='Postcode not found';return;}
    const lat1=d1.result.latitude,lon1=d1.result.longitude;
    const lat2=d2.result.latitude,lon2=d2.result.longitude;
    const R=3958.8;
    const dLat=(lat2-lat1)*Math.PI/180;
    const dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    const dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    const roadEst=Math.round(dist*1.28);
    const mEl=document.getElementById('df-miles');
    if(mEl)mEl.value=roadEst;
    DF.miles=roadEst;
    if(el)el.textContent=`Estimated ${roadEst} miles (${dist.toFixed(1)} mi straight line × 1.28 road factor)`;
  }catch(e){if(el)el.textContent='Could not estimate — enter manually';}
}
async function finishDone(){
  DF.miles=parseFloat(document.getElementById('df-miles')?.value)||0;
  const job=S.jobs.find(j=>j.id===DF.jobId);
  if(!job)return;
  job.status='done';
  job.completedDate=today();
  job.pod=DF.pod||null;

}

    if(d1.status!==200||d2.status!==200){if(el)el.textContent='Postcode not found';return;}
    const lat1=d1.result.latitude,lon1=d1.result.longitude;
    const lat2=d2.result.latitude,lon2=d2.result.longitude;
    const R=3958.8,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    const dist=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    const roadEst=Math.round(dist*1.28);
    const mEl=document.getElementById('cf-miles');
    if(mEl)mEl.value=roadEst;
    CF.miles=roadEst;
    if(el)el.textContent=`Estimated ${roadEst} miles (${dist.toFixed(1)} mi straight line × 1.28 road factor)`;
  }catch(e){if(el)el.textContent='Could not estimate — enter manually';}
}

}

function gasIsOk(){return !!(S.settings.gasUrl);}

async function gasRequest(action, payload={}){
  const url=S.settings.gasUrl;
  if(!url)return null;
  try{
    const r=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action,...payload})
    });
    if(!r.ok)return null;
    const txt=await r.text();
    return JSON.parse(txt);
  }catch(e){return null;}
}

async function testGasConnection(){
  const res=await gasRequest('test');
  return res?.ok?res:null;
}

async function gasUploadPhoto(dataUrl,subfolder,filename){
  if(!gasIsOk()||!dataUrl)return null;
  const base64=dataUrl.split(',')[1];
  const mimeType=(dataUrl.match(/:(.*?);/)||[])[1]||'image/jpeg';
  const res=await gasRequest('uploadPhoto',{base64,mimeType,subfolder,filename});
  return res?.ok?res.url:null;
}

async function gUploadPOD(job){
  if(!job.pod||!gasIsOk())return null;
  const clientLabel=(clientName(job.clientId)||'One-off').replace(/[^a-zA-Z0-9 ]/g,'-').trim();
  const filename='POD-'+job.name.replace(/[^a-zA-Z0-9]/g,'-').slice(0,40)+'-'+(job.completedDate||'unknown')+'.jpg';
  return gasUploadPhoto(job.pod,'PODs/'+clientLabel,filename);
}

async function gasCreateInvoiceDoc(inv){

      clientAddr:inv.clientAddr||'',clientEmail:inv.clientEmail||'',

  });
  return[h,...rows];
}
function prepInvoiceRows(){
  const h=['Invoice No','Client','Issue Date','Due Date','Total £','Status','Paid Date','Payment Method'];
  const rows=S.invoices.sort((a,b)=>b.issueDate>a.issueDate?1:-1).map(inv=>[
    inv.number||'',inv.clientName||clientName(inv.clientId),inv.issueDate||'',inv.dueDate||'',
    inv.total||0,inv.status||'',inv.paidDate||'',inv.payMethod||''
  ]);
  return[h,...rows];
}
function prepExpenseRows(){
  const h=['Date','Category','Description','Amount £','Receipt Drive Link'];
  const rows=S.expenses.sort((a,b)=>b.date>a.date?1:-1).map(e=>[
    e.date||'',e.category||'',e.description||'',e.amount||0,e.receiptDriveUrl||''
  ]);
  return[h,...rows];
}
function prepMileageRows(){
  const rate=S.settings.mileageRate||0.45;
  const h=['Date','Job','Client','Pickup Post','Delivery Post','Miles','Rate £/mi','Claim £'];
  const rows=S.jobs.filter(j=>j.status==='done'&&(j.miles||0)>0).sort((a,b)=>b.completedDate>a.completedDate?1:-1).map(j=>[
    j.completedDate||'',j.name||'',clientName(j.clientId),j.pickPost||'',j.delPost||'',
    j.miles||0,rate,((j.miles||0)*rate).toFixed(2)
  ]);
  return[h,...rows];
}
function prepPLRows(){
  const h=['Month','Income Paid £','Outstanding £','Expenses £','Mileage Claims £','Net Profit £','Tax Stash £'];
  const taxPct=(S.settings.taxStashPct||25)/100;
  const rate=S.settings.mileageRate||0.45;
  const months={};
  for(let i=23;i>=0;i--){
    const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    months[k]={paid:0,out:0,exp:0,miles:0};
  }
  S.invoices.filter(i=>i.status==='paid'&&i.paidDate).forEach(i=>{const m=i.paidDate.slice(0,7);if(months[m])months[m].paid+=(i.total||0);});
  S.invoices.filter(i=>(i.status==='sent'||i.status==='overdue')&&i.issueDate).forEach(i=>{const m=i.issueDate.slice(0,7);if(months[m])months[m].out+=(i.total||0);});
  S.expenses.filter(e=>e.date).forEach(e=>{const m=e.date.slice(0,7);if(months[m])months[m].exp+=(parseFloat(e.amount)||0);});
  S.jobs.filter(j=>j.status==='done'&&j.completedDate&&(j.miles||0)>0).forEach(j=>{const m=j.completedDate.slice(0,7);if(months[m])months[m].miles+=(j.miles||0)*rate;});
  const rows=Object.entries(months).reverse().map(([m,d])=>{
    const net=d.paid-d.exp-d.miles;
    return[m,d.paid.toFixed(2),d.out.toFixed(2),d.exp.toFixed(2),d.miles.toFixed(2),net.toFixed(2),(d.paid*taxPct).toFixed(2)];
  });
  return[h,...rows];
}

function calcStreak(){
  const dates=new Set(S.jobs.filter(j=>j.status==='done'&&j.completedDate).map(j=>j.completedDate));
  if(!dates.size)return 0;
  let streak=0,d=today();
  while(dates.has(d)){
    streak++;
    const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()-1);
    d=dt.toISOString().split('T')[0];
  }
  return streak;
}
function bestMonth(){

function getMonthlyData(n){
  const months=[];
  for(let i=n-1;i>=0;i--){
    const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
    const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    const label=d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'});
    const paid=S.invoices.filter(inv=>inv.status==='paid'&&inv.paidDate&&inv.paidDate.startsWith(k)).reduce((s,inv)=>s+(inv.total||0),0);
    const exp=S.expenses.filter(e=>e.date&&e.date.startsWith(k)).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const jobs=S.jobs.filter(j=>j.status==='done'&&j.completedDate&&j.completedDate.startsWith(k)).length;
    months.push({k,label,paid,exp,jobs,net:paid-exp});
  }
  return months;
}

// ── Route ordering helpers ──────────────────────────
function getDayKey(job){return job.dueDate||'no-date';}
function getDayJobs(dateKey){
  return S.jobs.filter(j=>j.status!=='done'&&getDayKey(j)===dateKey)
    .sort((a,b)=>(a.routeOrder??999)-(b.routeOrder??999)||(a.agreedTime||'').localeCompare(b.agreedTime||''));
}
function getPickupJobs(dateKey){
  return S.jobs.filter(j=>j.status!=='done'&&j.pickDate===dateKey&&j.pickDate!==j.dueDate);
}
function markPickedUp(jobId){
  const j=S.jobs.find(j=>j.id===jobId);
  if(!j)return;
  if(j.status==='collected'){j.status='active';save();render();}
  else{startCollectFlow(jobId);}
}
function getRouteDays(){
  const keys=new Set();
  S.jobs.filter(j=>j.status!=='done').forEach(j=>{
    keys.add(getDayKey(j));
    if(j.pickDate&&j.pickDate!==j.dueDate)keys.add(j.pickDate);
  });
  return [...keys].sort((a,b)=>{
    if(a==='no-date')return 1;if(b==='no-date')return -1;
    return a>b?1:-1;
  });
}
function getAllStopsForDay(dateKey){
  const picks=getPickupJobs(dateKey).map(j=>({job:j,type:'pick',order:j.pickRouteOrder??999,time:j.pickTime||'99:99'}));
  const dels=getDayJobs(dateKey).map(j=>({job:j,type:'del',order:j.routeOrder??999,time:j.agreedTime||'99:99'}));
  return[...picks,...dels].sort((a,b)=>a.order-b.order||a.time.localeCompare(b.time));
}
function moveStopInRoute(jobId,type,dir){
  const job=S.jobs.find(j=>j.id===jobId);if(!job)return;
  const dateKey=type==='pick'?job.pickDate:getDayKey(job);
  if(!dateKey)return;
  const stops=getAllStopsForDay(dateKey);
  stops.forEach((s,i)=>{if(s.type==='pick')s.job.pickRouteOrder=i;else s.job.routeOrder=i;});
  const idx=stops.findIndex(s=>s.job.id===jobId&&s.type===type);
  const swapIdx=dir==='up'?idx-1:idx+1;
  if(swapIdx<0||swapIdx>=stops.length)return;
  const a=stops[idx],b=stops[swapIdx];
  const aOrd=a.type==='pick'?a.job.pickRouteOrder:a.job.routeOrder;
  const bOrd=b.type==='pick'?b.job.pickRouteOrder:b.job.routeOrder;
  if(a.type==='pick')a.job.pickRouteOrder=bOrd;else a.job.routeOrder=bOrd;
  if(b.type==='pick')b.job.pickRouteOrder=aOrd;else b.job.routeOrder=aOrd;
  _leaveByCache={};save();render();
}
function dayMapsUrl(dateKey){
  const addrs=getAllStopsForDay(dateKey)
    .filter(s=>!(s.type==='pick'&&(s.job.status==='collected'||s.job.status==='done')))
    .map(s=>encodeURIComponent(s.type==='pick'?(jobAddr(s.job,'pick')||''):(jobAddr(s.job,'del')||'')))
    .filter(Boolean);
  if(!addrs.length)return null;
  const dest=addrs[addrs.length-1];
  const mid=addrs.slice(0,-1);
  return'https://www.google.com/maps/dir/?api=1&destination='+dest+(mid.length?'&waypoints='+mid.join('|'):'')+'&travelmode=driving';
}
function rUnifiedStop(stop,idx,allStops){
  const{job,type}=stop;
  const isFirst=idx===0,isLast=idx===allStops.length-1;
  const client=getClient(job.clientId);
  const phone=(client?.phone||'').replace(/[^0-9+]/g,'');

// ─── Leave-By Calculator ──────────────────────────────────────
function _lbId(dk){return'lby-'+dk.replace(/[^a-z0-9]/gi,'_');}
async function calcLeaveBy(dateKey){
  const el=document.getElementById(_lbId(dateKey));if(!el)return;
  const stops=getAllStopsForDay(dateKey);
  const firstStop=stops.find(s=>s.type==='pick'?s.job.pickTime:s.job.agreedTime);
  if(!firstStop){
    el.innerHTML=`<span class="leave-by-label">SET TIMES ON STOPS TO SEE WHEN TO LEAVE</span>`;return;
  }
  const firstTime=firstStop.type==='pick'?firstStop.job.pickTime:firstStop.job.agreedTime;
  const homePost=S.settings.homePost;
  if(!homePost){
    el.innerHTML=`<span class="leave-by-label">FIRST STOP ⏰ ${firstTime}</span><br>
      <button class="btn sm" style="margin-top:8px" onclick="go('set')">🏠 SET HOME POSTCODE FOR LEAVE TIME</button>`;return;
  }
  const destPost=firstStop.type==='pick'
    ?(firstStop.job.pickPost||'')
    :(firstStop.job.pickPost||firstStop.job.delPost||'');
  if(!destPost){
    el.innerHTML=`<span class="leave-by-label">FIRST STOP ⏰ ${firstTime} · NO POSTCODE SET</span>`;return;
  }
  el.innerHTML=`<span class="leave-by-label">CALCULATING...</span>`;
  try{
    const[r1,r2]=await Promise.all([
      fetch('https://api.postcodes.io/postcodes/'+encodeURIComponent(homePost.replace(/\s/g,''))),
      fetch('https://api.postcodes.io/postcodes/'+encodeURIComponent(destPost.replace(/\s/g,'')))
    ]);
    const[d1,d2]=await Promise.all([r1.json(),r2.json()]);
    if(d1.status!==200||d2.status!==200){
      el.innerHTML=`<span class="leave-by-label">FIRST STOP ⏰ ${firstTime} · POSTCODE NOT FOUND</span>`;return;
    }
    const lat1=d1.result.latitude,lon1=d1.result.longitude;
    const lat2=d2.result.latitude,lon2=d2.result.longitude;
    const R=3958.8,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    const miles=R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))*1.28;
    const driveMins=Math.round(miles/30*60);
    const bufferMins=15;
    const[h,m]=firstTime.split(':').map(Number);
    const leaveMins=(h*60+m)-(driveMins+bufferMins);
    const lh=Math.max(0,Math.floor(leaveMins/60)),lm=Math.max(0,leaveMins%60);
    const leaveStr=String(lh).padStart(2,'0')+':'+String(lm).padStart(2,'0');
    el.innerHTML=`<div class="leave-by-label">🏠 LEAVE HOME BY</div>
      <span class="leave-by-time">${leaveStr}</span>
      <div class="leave-by-sub">FIRST STOP ${firstTime} · ${Math.round(miles)} MI · ~${driveMins} MIN DRIVE + ${bufferMins} MIN PREP</div>`;
  }catch(e){
    el.innerHTML=`<span class="leave-by-label">FIRST STOP ⏰ ${firstTime} · COULD NOT CALC DRIVE TIME</span>`;
  }
}
function rRouteDaySection(dateKey){
  const allStops=getAllStopsForDay(dateKey);
  if(!allStops.length)return'';
  const mapsUrl=dayMapsUrl(dateKey);
  const label=dateKey==='no-date'?'📦 NO DATE SET':
    dateKey===today()?'📅 TODAY — '+fmtD(dateKey).toUpperCase():
    daysUntil(dateKey)<0?'⚠️ OVERDUE — '+fmtD(dateKey).toUpperCase():
    '📆 '+fmtD(dateKey).toUpperCase();
  const firstWithTime=allStops.find(s=>s.type==='pick'?s.job.pickTime:s.job.agreedTime);
  setTimeout(()=>calcLeaveBy(dateKey),60);
  const n=allStops.length;
  return`<div class="rday">
    <div class="rday-hdr">
      <div style="flex:1">
        <div class="rday-date">${label}</div>
        <div class="rday-count">${n} STOP${n!==1?'S':''} · USE ▲▼ TO REORDER · <span style="color:var(--yellow)">■</span> COLLECT <span style="color:var(--gb3)">■</span> DELIVER</div>
      </div>
    </div>
    <div class="leave-by-box" id="${_lbId(dateKey)}">
      <span class="leave-by-label">${firstWithTime?'CALCULATING...':'SET TIMES ON STOPS TO SEE WHEN TO LEAVE'}</span>
    </div>
    ${mapsUrl?`<a href="${mapsUrl}" target="_blank" class="btn big" style="display:block;text-decoration:none;margin-bottom:10px;text-align:center">🗺️ OPEN FULL DAY ROUTE IN MAPS</a>`:''}
    ${allStops.map((s,i)=>rUnifiedStop(s,i,allStops)).join('')}
  </div>`;
}
function rRoute(){
  const days=getRouteDays();
  if(!days.length)return`<div class="empty"><span class="empty-ic">🗺️</span>NO ACTIVE JOBS<br>ADD JOBS FIRST</div>`;
  return`<div style="background:var(--gb1);border:3px solid var(--gb2);padding:10px 12px;margin-bottom:14px">
    <div style="font-size:12px;color:var(--gb4);margin-bottom:4px">🗺️ ROUTE PLANNER</div>
    <div style="font-size:9px;color:var(--gb2)">REORDER STOPS · CHECK LEAVE TIME · NAVIGATE FROM YOUR LOCATION</div>
  </div>
  ${days.map(rRouteDaySection).join('')}`;
}

async function gcalConnect(){
  const el=document.getElementById('s-gcalid');
  if(el&&el.value.trim())S.settings.gcalClientId=el.value.trim();
  saveOnly();
  const st=document.getElementById('gcal-status');
  if(!S.settings.gcalClientId){
    if(st){st.textContent='Paste your Client ID first then tap CONNECT';st.style.color='var(--red)';}
    return;
  }
  if(st){st.textContent='Connecting...';st.style.color='var(--gb2)';}
  try{
    await gcalRequestToken();
    if(st){st.textContent='✓ Connected — jobs will sync automatically';st.style.color='var(--gb3)';}
    render();
  }catch(e){
    if(st){st.textContent='Connection failed: '+e.message;st.style.color='var(--red)';}
  }
}

async function testGAS(){
  const el=document.getElementById('g-status');
  if(el)el.textContent='Testing connection...';
  if(el)el.style.color='var(--gb2)';
  const res=await testGasConnection();
  if(el){
    if(res?.ok){
      el.textContent='✓ '+( res.msg||'Connected! Sheets, Drive, and Docs are ready.');
      el.style.color='var(--gb3)';
      // Trigger first sync
      syncToSheets();
    }else{
      el.textContent='⚠️ Could not connect. Check URL and make sure Access is set to Anyone.';
      el.style.color='var(--red)';
    }
  }
}

  const script=getGASScript();

    alert('Apps Script code copied! Paste it into your Apps Script editor.');
  }).catch(()=>{
    // Fallback — show in modal
    showMod(`<div class="m-title">📋 APPS SCRIPT CODE</div>

// ─── Smart Slot Suggestions ───────────────────────────────────
function _t2m(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function _m2t(m){const h=Math.max(0,Math.floor(m/60));const mn=Math.max(0,m%60);return String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0');}

function calcSlotSuggestions(dateStr, excludeJobId){
  const jobs=getDayJobs(dateStr).filter(j=>j.id!==excludeJobId);
  const timed=jobs.filter(j=>j.agreedTime).sort((a,b)=>_t2m(a.agreedTime)-_t2m(b.agreedTime));
  const JOB_SLOT=90; // mins assumed per stop including travel
  const DAY_START=8*60, DAY_END=18*60;
  const slots=[];

  if(!timed.length){
    // Jobs exist but none have times set
    return[{time:'09:00',label:'Morning (no times set yet)'},{time:'12:00',label:'Midday'},{time:'14:30',label:'Afternoon'}];
  }
  // Slot before first job
  const firstMins=_t2m(timed[0].agreedTime);
  if(firstMins-JOB_SLOT>=DAY_START){
    slots.push({time:_m2t(Math.max(DAY_START,firstMins-JOB_SLOT)),label:`free before your ${timed[0].agreedTime} job`});
  }
  // Gaps between jobs
  for(let i=0;i<timed.length-1;i++){
    const gapStart=_t2m(timed[i].agreedTime)+JOB_SLOT;
    const gapEnd=_t2m(timed[i+1].agreedTime);
    const gapMins=gapEnd-gapStart;
    if(gapMins>=JOB_SLOT){
      slots.push({time:_m2t(gapStart+15),label:`free ~${gapMins} min gap after ${timed[i].agreedTime}`});
    }
  }
  // After last job
  const lastEnd=_t2m(timed[timed.length-1].agreedTime)+JOB_SLOT;
  if(lastEnd+15<=DAY_END){
    slots.push({time:_m2t(lastEnd+15),label:`free from ~${_m2t(lastEnd)} onwards`});
  }
  return slots;
}

function checkDaySlots(dateStr, excludeJobId=''){
  const el=document.getElementById('jf-slot-panel');
  if(!el)return;
  if(!dateStr){el.innerHTML='';return;}
  const existing=getDayJobs(dateStr).filter(j=>j.id!==excludeJobId);
  if(!existing.length){el.innerHTML='';return;}

  const timed=existing.filter(j=>j.agreedTime);
  const slots=calcSlotSuggestions(dateStr,excludeJobId);
  const clientName_val=document.getElementById('jf-client')?.selectedOptions?.[0]?.text||'';
  const dateLabel=fmtD(dateStr);

  el.innerHTML=`<div style="background:var(--gb0);border:2px solid var(--yellow);padding:10px;margin:8px 0">
    <div style="font-size:10px;color:var(--yellow);margin-bottom:6px">⚠️ ${existing.length} JOB${existing.length!==1?'S':''} ALREADY ON ${dateLabel.toUpperCase()}</div>
    ${timed.length?`<div style="font-size:9px;color:var(--gb2);margin-bottom:8px">${timed.map(j=>`⏰ ${j.agreedTime} — ${esc(j.name)}`).join('<br>')}</div>`:''}
    ${slots.length?`<div style="font-size:9px;color:var(--gb4);margin-bottom:6px">AVAILABLE SLOTS:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
      ${slots.map(s=>`<button class="btn sm dn" onclick="applySlot('${s.time}')" style="display:flex;flex-direction:column;align-items:center;height:auto;padding:8px 10px"><span style="font-size:12px">⏰ ${s.time}</span><span style="font-size:8px;color:var(--gb2);margin-top:2px;white-space:nowrap">${s.label}</span></button>`).join('')}
    </div>
    <button class="btn sm" style="width:100%" onclick="openClientSlotMsg('${dateStr}','${excludeJobId}')">📱 WHAT DO I TELL MY CLIENT?</button>`
    :'<div style="font-size:9px;color:var(--red)">⚠️ DAY LOOKS FULLY BOOKED</div>'}
  </div>`;
}

// ─── Google Calendar Integration ─────────────────────────────
function buildGCalUrl(job){
  if(!job.dueDate)return null;
  const title=encodeURIComponent(job.name+(job.clientId?' · '+clientName(job.clientId):''));
  const location=encodeURIComponent(jobAddr(job,'del')||'');
  const details=encodeURIComponent([
    job.notes||'',
    'Pickup: '+(jobAddr(job,'pick')||'?'),
    'Delivery: '+(jobAddr(job,'del')||'?'),
    job.price?'Price: £'+job.price:''
  ].filter(Boolean).join('\n'));
  let dates;
  if(job.agreedTime){
    const[h,m]=job.agreedTime.split(':').map(Number);
    const sd=job.dueDate.replace(/-/g,'');
    const st=String(h).padStart(2,'0')+String(m).padStart(2,'0')+'00';
    const eh=Math.min(h+1,23);
    const et=String(eh).padStart(2,'0')+String(m).padStart(2,'0')+'00';
    dates=`${sd}T${st}/${sd}T${et}`;
  } else {
    const sd=job.dueDate.replace(/-/g,'');
    const ed=addDays(job.dueDate,1).replace(/-/g,'');
    dates=`${sd}/${ed}`;
  }
  return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${details}&location=${location}`;
}
function addToGCal(jobId){
  const job=S.jobs.find(j=>j.id===jobId);if(!job)return;
  const url=buildGCalUrl(job);
  if(url)window.open(url,'_blank');
  else alert('Set a due date on this job first to add it to Google Calendar.');
}

// ═══════════════════════════════════
// GOOGLE CALENDAR AUTO-SYNC
// ═══════════════════════════════════
const GCAL_API='https://www.googleapis.com/calendar/v3/calendars/primary/events';
const GCAL_SCOPE='https://www.googleapis.com/auth/calendar.events';

function gcalConnected(){return !!(S.settings.gcalClientId&&S.settings.gcalToken&&S.settings.gcalTokenExpiry>Date.now()+30000);}

function gcalRequestToken(){
  return new Promise((resolve,reject)=>{
    if(!S.settings.gcalClientId){reject(new Error('No client ID'));return;}
    if(typeof google==='undefined'||!google?.accounts?.oauth2){reject(new Error('GIS not loaded'));return;}
    const tc=google.accounts.oauth2.initTokenClient({
      client_id:S.settings.gcalClientId,
      scope:GCAL_SCOPE,
      callback:(r)=>{
        if(r.error){reject(new Error(r.error));return;}
        S.settings.gcalToken=r.access_token;
        S.settings.gcalTokenExpiry=Date.now()+(r.expires_in||3600)*1000;
        saveOnly();
        const el=document.getElementById('gcal-status');
        if(el){el.textContent='✓ Connected to Google Calendar';el.style.color='var(--gb3)';}
        resolve(r.access_token);
      }
    });
    tc.requestAccessToken({prompt:''});
  });
}

async function gcalToken(){
  if(gcalConnected())return S.settings.gcalToken;
  return gcalRequestToken();
}

function buildGCalBody(job){
  if(!job.dueDate)return null;
  const title=job.name+(job.clientId?' · '+clientName(job.clientId):'');
  const location=jobAddr(job,'del')||'';
  const description=['Pickup: '+(jobAddr(job,'pick')||'?'),'Delivery: '+(jobAddr(job,'del')||'?'),job.notes||'',job.price?'Price: £'+job.price:''].filter(Boolean).join('\n');
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  if(job.agreedTime){
    const[h,m]=job.agreedTime.split(':').map(Number);
    const pad=n=>String(n).padStart(2,'0');
    const start=`${job.dueDate}T${pad(h)}:${pad(m)}:00`;
    const end=`${job.dueDate}T${pad(Math.min(h+1,23))}:${pad(m)}:00`;
    return{summary:title,location,description,start:{dateTime:start,timeZone:tz},end:{dateTime:end,timeZone:tz}};
  }
  return{summary:title,location,description,start:{date:job.dueDate},end:{date:addDays(job.dueDate,1)}};
}

async function gcalSync(job,del=false){
  if(!S.settings.gcalClientId)return; // not configured
  if(!job.dueDate&&!del)return;        // no date = nothing to sync
  try{
    const tok=await gcalToken();
    if(del&&job.gcalEventId){
      await fetch(`${GCAL_API}/${job.gcalEventId}`,{method:'DELETE',headers:{Authorization:'Bearer '+tok}});
      job.gcalEventId=null;saveOnly();return;
    }
    const body=buildGCalBody(job);if(!body)return;
    let res;
    if(job.gcalEventId){
      res=await fetch(`${GCAL_API}/${job.gcalEventId}`,{method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
    }else{
      res=await fetch(GCAL_API,{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
    }
    if(res.status===401||res.status===403){
      // Token expired — clear and retry once
      S.settings.gcalToken='';S.settings.gcalTokenExpiry=0;saveOnly();
      const tok2=await gcalRequestToken();
      res=job.gcalEventId
        ?await fetch(`${GCAL_API}/${job.gcalEventId}`,{method:'PUT',headers:{Authorization:'Bearer '+tok2,'Content-Type':'application/json'},body:JSON.stringify(body)})
        :await fetch(GCAL_API,{method:'POST',headers:{Authorization:'Bearer '+tok2,'Content-Type':'application/json'},body:JSON.stringify(body)});
    }
    if(res.ok){const d=await res.json();if(d.id){job.gcalEventId=d.id;saveOnly();}}
  }catch(e){console.warn('GCal sync:',e);}
}

function gcalDisconnect(){
  if(S.settings.gcalToken&&typeof google!=='undefined'&&google?.accounts?.oauth2){
    google.accounts.oauth2.revoke(S.settings.gcalToken,()=>{});
  }
  S.settings.gcalToken='';S.settings.gcalTokenExpiry=0;
  saveOnly();render();
}

function createInvFromJobs(clientId, jobIds){
  const client=getClient(clientId);
  const jobs=S.jobs.filter(j=>jobIds.includes(j.id));
  const lineItems=jobs.map(j=>({description:j.name,date:j.completedDate,amount:j.price||0}));
  const total=lineItems.reduce((s,l)=>s+(l.amount||0),0);
  const iss=today();
  const terms=client?.paymentTerms||S.settings.paymentTerms||14;
  const inv={
    id:uid(),number:nextInvNum(),type:jobIds.length===1?'immediate':'batch',
    clientId:clientId||null,
    clientName:client?.name||'',clientEmail:client?.email||'',clientAddr:client?.addr||'',
    jobIds,lineItems,issueDate:iss,dueDate:addDays(iss,terms),total,
    status:'draft',paidDate:null,payMethod:null,notes:''
  };
  jobIds.forEach(jid=>{const j=S.jobs.find(x=>x.id===jid);if(j)j.invoiceId=inv.id;});
  S.invoices.push(inv);save();
  return inv;
}

function updateInvTotal(clientId){
  const uninvoiced=S.jobs.filter(j=>j.clientId===clientId&&j.status==='done'&&!j.invoiceId);
  const total=uninvoiced.filter(j=>document.getElementById('si-'+j.id)?.checked).reduce((s,j)=>s+(j.price||0),0);
  const el=document.getElementById('inv-total-val');
  if(el)el.textContent=fmtCur(total);
}

async function submitSendInvoice(clientId){
  const uninvoiced=S.jobs.filter(j=>j.clientId===clientId&&j.status==='done'&&!j.invoiceId);
  const selected=uninvoiced.filter(j=>document.getElementById('si-'+j.id)?.checked);
  if(!selected.length){alert('Select at least one job.');return}
  const inv=createInvFromJobs(clientId,selected.map(j=>j.id));

  // If GAS connected, create Google Doc invoice immediately
  if(gasIsOk()){
    showMod(`<div class="m-title">📄 CREATING INVOICE...</div><div class="loading"><p>▌ BUILDING GOOGLE DOC</p></div>`);
    try{
      const docUrl=await gasCreateInvoiceDoc(inv);
      if(docUrl){
        inv.docUrl=docUrl;save();
        showInvoiceSendOptions(inv,docUrl);
        return;
      }
    }catch(e){}
    // GAS failed, fall through to preview
  }
  closeModal();
  await previewInvoice(inv.id);
}

function openCustomInvoice(clientId, jobId){
  CI=[];
  const client=getClient(clientId);
  CI_CLIENT={
    id:clientId||'',
    name:client?.name||'',
    email:client?.email||'',
    addr:client?.addr||''
  };
  // Pre-fill from job if provided
  if(jobId){
    const job=S.jobs.find(j=>j.id===jobId);
    if(job)CI.push({description:job.name+' — delivery',amount:job.price||0});
  }
  if(!CI.length)CI.push({description:'',amount:0});
  showMod(rCustomInvModal());
}

function rCILines(){
  return CI.map((l,i)=>`<div class="li-row">
    <input class="li-desc" placeholder="Description of work" value="${esc(l.description||'')}" oninput="ciSet(${i},'description',this.value)">
    <input class="li-amt" type="number" placeholder="£" value="${l.amount||''}" oninput="ciSet(${i},'amount',this.value)" min="0" step="0.01">
    <button class="btn dl sm" onclick="ciDel(${i})">✕</button>
  </div>`).join('')}
function ciSet(i,f,v){CI[i][f]=f==='amount'?parseFloat(v)||0:v;refreshCILines()}
function ciDel(i){CI.splice(i,1);refreshCILines()}
function addCILine(){CI.push({description:'',amount:0});refreshCILines()}
function refreshCILines(){
  const el=document.getElementById('ci-lines');if(el)el.innerHTML=rCILines();
  const t=CI.reduce((s,l)=>s+(parseFloat(l.amount)||0),0);
  const tel=document.getElementById('ci-total');if(tel)tel.textContent=fmtCur(t);
}
function ciClientChange(){
  const id=document.getElementById('ci-client')?.value||'';
  CI_CLIENT.id=id;
  const c=getClient(id);
  if(c){CI_CLIENT.name=c.name;CI_CLIENT.email=c.email;CI_CLIENT.addr=c.addr||'';}
  const man=document.getElementById('ci-manual-client');
  if(man)man.style.display=id?'none':'block';
}
async function submitCustomInv(){
  const cid=document.getElementById('ci-client')?.value||'';
  const cname=cid?getClient(cid)?.name:document.getElementById('ci-cname')?.value||'';
  const cemail=cid?getClient(cid)?.email:document.getElementById('ci-cemail')?.value||'';

    id:uid(),number:nextInvNum(),type:'custom',

// ── INVOICE PDF ──
async function genPDF(inv){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const biz=S.settings;const W=210,M=15;
  // Header left: business
  doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(15,56,15);
  doc.text(biz.bizName||'Odd Socks',M,24);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(80,80,80);
  let ly=31;
  if(biz.bizAddr){biz.bizAddr.split('\n').forEach(l=>{doc.text(l,M,ly);ly+=5});};
  if(biz.bizPhone){doc.text(biz.bizPhone,M,ly);ly+=5}
  if(biz.bizEmail){doc.text(biz.bizEmail,M,ly);ly+=5}
  // Header right: invoice number
  doc.setFont('helvetica','bold');doc.setFontSize(20);doc.setTextColor(15,56,15);
  doc.text('INVOICE',W-M,22,{align:'right'});
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(60,60,60);
  doc.text(inv.number,W-M,30,{align:'right'});
  doc.text('Issued: '+fmtDShort(inv.issueDate),W-M,37,{align:'right'});
  doc.text('Due: '+fmtDShort(inv.dueDate),W-M,44,{align:'right'});
  // Divider
  doc.setDrawColor(15,56,15);doc.setLineWidth(0.8);doc.line(M,52,W-M,52);
  // Bill to
  doc.setFontSize(7);doc.setTextColor(120,120,120);doc.text('BILL TO',M,60);
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(20,20,20);
  doc.text(inv.clientName||'',M,67);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(80,80,80);
  let cy=73;
  if(inv.clientAddr){inv.clientAddr.split('\n').forEach(l=>{doc.text(l,M,cy);cy+=5});}
  if(inv.clientEmail){doc.text(inv.clientEmail,M,cy);cy+=5}
  // Table header
  const tY=Math.max(85,cy+8);
  doc.setFillColor(15,56,15);doc.rect(M,tY-5,W-2*M,9,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(196,217,107);
  doc.text('DESCRIPTION',M+3,tY);
  doc.text('DATE',150,tY);
  doc.text('AMOUNT',W-M-3,tY,{align:'right'});
  // Items
  let iY=tY+9;doc.setFont('helvetica','normal');doc.setTextColor(30,30,30);
  inv.lineItems.forEach((item,i)=>{
    if(i%2===0){doc.setFillColor(245,248,230);doc.rect(M,iY-4,W-2*M,8,'F');}
    doc.setFontSize(8);
    const lines=doc.splitTextToSize(item.description||'',120);
    doc.text(lines,M+3,iY);
    if(item.date)doc.text(fmtDShort(item.date),150,iY);
    doc.text(fmtCur(item.amount||item.total||0),W-M-3,iY,{align:'right'});
    iY+=Math.max(8,lines.length*5+2);
  });
  // Total
  iY+=4;doc.setDrawColor(15,56,15);doc.setLineWidth(0.5);doc.line(M,iY,W-M,iY);
  iY+=8;
  doc.setFillColor(15,56,15);doc.rect(W-M-55,iY-5,55,10,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(196,217,107);
  doc.text('TOTAL',W-M-45,iY+1);
  doc.text(fmtCur(inv.total),W-M-3,iY+1,{align:'right'});
  // Payment details
  iY+=16;doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(60,60,60);
  if(biz.bizBank){const bl=doc.splitTextToSize('Payment: '+biz.bizBank,W-2*M);doc.text(bl,M,iY);iY+=bl.length*5+3;}
  doc.text(`Terms: ${(getClient(inv.clientId)||{}).paymentTerms||biz.paymentTerms||14} days from issue`,M,iY);iY+=5;
  if(inv.notes){doc.text('Note: '+inv.notes,M,iY);iY+=5;}
  // POD Drive links
  const podLinks=inv.jobIds?.map(jid=>S.jobs.find(j=>j.id===jid)).filter(j=>j?.podDriveUrl)||[];
  if(podLinks.length){
    iY+=6;doc.setFontSize(7);doc.setTextColor(60,60,60);
    doc.text('Proof of Delivery:',M,iY);iY+=5;
    podLinks.forEach(j=>{
      doc.setTextColor(15,56,150);
      const line=doc.splitTextToSize(j.name+': '+j.podDriveUrl,W-2*M);
      doc.text(line,M,iY);iY+=line.length*4+2;
    });
  }

async function shareInvPDF(invId){
  const inv=S.invoices.find(i=>i.id===invId);if(!inv)return;
  try{
    const doc=await genPDF(inv);
    const blob=doc.output('blob');
    const file=new File([blob],inv.number+'.pdf',{type:'application/pdf'});
    if(navigator.share&&navigator.canShare({files:[file]})){
      await navigator.share({title:inv.number,text:`Invoice ${inv.number} — ${fmtCur(inv.total)}`,files:[file]});
      if(inv.status==='draft'){inv.status='sent';save();render();}
    }else{
      const url=URL.createObjectURL(blob);const a=document.createElement('a');
      a.href=url;a.download=inv.number+'.pdf';document.body.appendChild(a);a.click();
      document.body.removeChild(a);URL.revokeObjectURL(url);
      if(inv.status==='draft'){inv.status='sent';save();render();}
    }
  }catch(e){alert('Could not generate PDF: '+e.message)}
}

async function callAI(messages,sys){
  const key=S.settings.apiKey;
  if(!key){alert('Add your API key in Settings first.');return null}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:700,system:sys,messages})
    });
    if(!res.ok){const e=await res.json().catch(()=>({}));alert('API error: '+(e.error?.message||res.status));return null}
    const d=await res.json();return d.content?.[0]?.text||null;
  }catch(e){alert('Network error.');return null}
}
function parseJSON(txt){try{const m=txt.match(/\{[\s\S]*\}/);if(m)return JSON.parse(m[0])}catch(e){}return null}
async function parseText(txt){
  if(!txt.trim()){alert('Paste some text first.');return}
  document.getElementById('mc').innerHTML=`<div class="loading"><p>▌ AI READING TEXT...</p></div>`;
  const sys=`Extract delivery job info. Return ONLY JSON: name (item), icon (one of 🛋️🪑🪞🖼️🏺🕰️📦🪔🗝️🧸🐶🪆🏮🧲🪟🚪), notes (handling), pickDate (YYYY-MM-DD pickup date), pickPost, pickStreet, pickNum, delPost, delStreet, delNum (UK addresses), dueDate (YYYY-MM-DD delivery date, today is ${today()}). Empty string for any missing fields.`;
  const raw=await callAI([{role:'user',content:txt}],sys);
  if(!raw)return;
  const p=parseJSON(raw);
  if(!p){document.getElementById('mc').innerHTML=`<div class="err-msg">⚠️ COULD NOT PARSE</div>`;setTimeout(showManual,1500);return}
  FD={...FD,...p,pm:!!(p.pickStreet||p.pickNum),dm:!!(p.delStreet||p.delNum)};
  document.getElementById('mc').innerHTML=`<div class="ok-msg">✓ AI FILLED THE FORM — CHECK DETAILS</div>`+rManualJobForm(FD);

function dBattle(ctx,tk){const b=WB;ctx.fillStyle='#0f380f';ctx.fillRect(0,0,WCW,WCH);ctx.fillStyle='#306230';ctx.fillRect(WCW*0.45,WCH*0.3,WCW*0.55,WCH*0.18);ctx.fillStyle='#306230';ctx.fillRect(0,WCH*0.58,WCW*0.55,WCH*0.18);const es=WB.shk&&WB.shk.t==='e'&&WB.shk.f>0?Math.sin(WB.shk.f)*4:0;ctx.save();ctx.translate(WCW*0.62+es,WCH*0.05);ctx.scale(3/WS,3/WS);dRival(ctx,0,0,3,b.enemy.col);ctx.restore();const ps=WB.shk&&WB.shk.t==='p'&&WB.shk.f>0?Math.sin(WB.shk.f)*3:0;ctx.save();ctx.translate(WCW*0.05+ps,WCH*0.38);ctx.scale(1.5,1.5);dChar(ctx,0,0,2,((tk/8|0)%2)&&b.state==='select'?1:0,true);ctx.restore();ctx.fillStyle='#0f380f';ctx.fillRect(4,4,WCW*0.55,32);ctx.strokeStyle='#c4d96b';ctx.lineWidth=1;ctx.strokeRect(4,4,WCW*0.55,32);ctx.fillStyle='#c4d96b';ctx.font=`6px 'Press Start 2P',monospace`;ctx.textBaseline='top';ctx.fillText(b.enemy.name,8,8);ctx.fillText(b.enemy.title,8,16);const epct=b.enemy.hp/b.enemy.maxHp;ctx.fillStyle='#306230';ctx.fillRect(8,26,WCW*0.5-8,6);ctx.fillStyle=hpColor(epct);ctx.fillRect(8,26,Math.max(0,(WCW*0.5-8)*epct),6);ctx.strokeStyle='#8bac0f';ctx.strokeRect(8,26,WCW*0.5-8,6);const pbx=WCW*0.45,pby=WCH*0.52;ctx.fillStyle='#0f380f';ctx.fillRect(pbx,pby,WCW*0.52,32);ctx.strokeStyle='#c4d96b';ctx.lineWidth=1;ctx.strokeRect(pbx,pby,WCW*0.52,32);ctx.fillStyle='#c4d96b';ctx.font=`6px 'Press Start 2P',monospace`;ctx.textBaseline='top';ctx.fillText('YOU',pbx+4,pby+4);const ppct=b.pHP/b.pMaxHP;ctx.fillStyle='#306230';ctx.fillRect(pbx+4,pby+20,WCW*0.46,6);ctx.fillStyle=hpColor(ppct);ctx.fillRect(pbx+4,pby+20,Math.max(0,WCW*0.46*ppct),6);ctx.strokeStyle='#8bac0f';ctx.strokeRect(pbx+4,pby+20,WCW*0.46,6);ctx.fillStyle='#c4d96b';ctx.fillText(`${b.pHP}/${b.pMaxHP}`,pbx+4,pby+12);if(b.state==='msg'||b.state==='win'||b.state==='lose'){const mby=WCH-46;ctx.fillStyle='#0f380f';ctx.fillRect(2,mby,WCW-4,44);ctx.strokeStyle='#c4d96b';ctx.lineWidth=WS;ctx.strokeRect(2,mby,WCW-4,44);ctx.fillStyle='#c4d96b';ctx.font=`6px 'Press Start 2P',monospace`;ctx.textBaselin function updateBtns(){const dp=document.getElementById('wdpad'),bb=document.getElementById('wbtns');if(!dp||!bb)return;const inB=!!WB;dp.style.display=inB?'none':'grid';bb.style.display=inB?'grid':'none';}

function wAct(){if(WB){if(WB.state==='msg'){bNextMsg();}return;}if(WP.msg){WP.msg.idx++;if(WP.msg.idx>=WP.msg.lines.length)WP.msg=null;return;}const[dx,dy]=WDIRS[WP.dir],fx=WP.tx+dx,fy=WP.ty+dy;const npc=WNPCS.find(n=>n.tx===fx&&n.ty===fy);if(npc){WP.msg={lines:npc.chat,idx:0};return;}const rival=WRIVALS.find(n=>n.tx===fx&&n.ty===fy);if(rival){WP.msg={lines:[...rival.intro,'GET READY!'],idx:0,onDone:()=>startBattle(rival)};return;}}

function bEnemyTurn(){const mi=WB.enemy.moves[Math.random()*WB.enemy.moves.length|0];let msg='';if(mi===0){const d=12+(Math.random()*10|0);WB.pHP=Math.max(0,WB.pHP-d);WB.shk={t:'p',f:16};msg=`${WB.enemy.name}\nHAGGLES HARD!\n-${d} HP`;}else if(mi===1){if(Math.random()<0.65){const d=18+(Math.random()*8|0);WB.pHP=Math.max(0,WB.pHP-d);WB.shk={t:'p',f:16};msg=`${WB.enemy.name}\nAPPRAISES!\n-${d} HP`;}else msg=`${WB.enemy.name}\nMISSED THE MARK!`;}else if(mi===2){const h=18;WB.enemy.hp=Math.min(WB.enemy.maxHp,WB.enemy.hp+h);msg=`${WB.enemy.name}\nPOLISHES TROPHY!\n+${h} HP`;}else{if(Math.random()<0.5){const d=28+(Math.random()*12|0);WB.pHP=Math.max(0,WB.pHP-d);WB.shk={t:'p',f:20};msg=`${WB.enemy.name}\nBLUFFS BOLDLY!\n-${d} HP`;}else msg=`${WB.enemy.name}\nBLUFF FAILED!`;}WB.state='msg';WB.msg=msg;WB.msgNext=()=>{if(WB.pHP<=0){WB.state='lose';WB.msg='YOU LOST!\n'+WB.enemy.winLine;WB.msgNext=()=>{WB=null;WP.msg=null;updateBtns();};return;}WB.state='select';updateBtns();};}

function wKD(e){if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyZ'].includes(e.code))e.preventDefault();if(e.code==='ArrowUp'||e.code==='KeyW')WP.keys.up=1;if(e.code==='ArrowDown'||e.code==='KeyS')WP.keys.dn=1;if(e.code==='ArrowLeft'||e.code==='KeyA')WP.keys.lt=1;if(e.code==='ArrowRight'||e.code==='KeyD')WP.keys.rt=1;if(e.code==='Space'||e.code==='KeyZ'||e.code==='Enter')WP.keys.a=1;}

function toggleTheme(){
  const isClean=document.body.classList.toggle('clean');

  const badge=document.getElementById('hdr-badge');

}
